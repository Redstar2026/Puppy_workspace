<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Walmart Pricing Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { walmart: { blue: '#0053e2', spark: '#ffc220' } } } }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-gradient-to-br from-walmart-blue via-blue-800 to-blue-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    {# Logo card #}
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-walmart-spark rounded-2xl shadow-xl mb-4">
        <span class="text-3xl font-black text-gray-900">W</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Pricing Platform</h1>
      <p class="text-blue-200 text-sm mt-1">Walmart México — Sistema de Gestión</p>
    </div>

    {# Login form #}
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if error %}
      <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2 text-red-700 text-sm">
        <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">
            Correo Electrónico
          </label>
          <input type="email" name="email" required autofocus
                 placeholder="usuario@walmart.com"
                 class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm
                        focus:outline-none focus:ring-2 focus:ring-walmart-blue focus:border-transparent
                        placeholder-gray-300 transition-all" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">
            Contraseña
          </label>
          <input type="password" name="password" required
                 placeholder="••••••••"
                 class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm
                        focus:oune focus:ring-2 focus:ring-walmart-blue focus:border-transparent
                        placeholder-gray-300 transition-all" />
        </div>
        <button type="submit"
                class="w-full bg-walmart-blue text-white font-bold py-3 rounded-xl
                       hover:bg-blue-700 active:bg-blue-800 transition-all shadow-md
                       hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0">
          Iniciar Sesión
        </button>
      </form>

      <p class="text-center text-xs text-gray-400 mt-6">
        ¿Problemas? Contacta al administrador del sistema
      </p>
    </div>

    <p class="text-center text-blue-300 text-xs mt-6">
      © 2025 Walmart de México — Equipo de Pricing
    </p>
  </div>
</body>
</html>
