<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nueva Solicitud — Walmart Pricing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Inter',sans-serif}
    .lbl{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:.25rem}
    .inp{width:100%;border:1px solid #d1d5db;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;outline:none}
    .inp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
  <aside class="w-60 bg-blue-700 text-white flex flex-col flex-shrink-0 min-h-screen">
    <div class="flex items-center gap-3 px-5 py-5 border-b border-blue-600">
      <div class="w-8 h-8 bg-yellow-400 rounded-lg flex items-center justify-center font-black text-blue-900 text-lg">W</div>
      <div><p class="font-bold text-sm">Pricing Platform</p><p class="text-blue-300 text-xs">Walmart México</p></div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="/"             class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">📊 Dashboard</a>
      <a href="/solicitudes"  class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">📋 Solicitudes</a>
      <a href="/solicitudes/nueva" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-white/20 font-semibold text-sm">➕ Nueva Solicitud</a>
    </nav>
    <div class="p-4 border-t border-blue-600">
      <p class="text-xs font-semibold text-white truncate">{{ user.nombre }}</p>
      <a href="/logout" class="block text-center text-xs text-blue-300 hover:text-white py-1 mt-2 rounded hover:bg-white/10 transition-colors">Cerrar sesión</a>
    </div>
  </aside>

  <main class="flex-1 p-8 overflow-y-auto">
    <div class="max-w-3xl mx-auto">
      <div class="flex items-center gap-3 mb-8">
        <a href="/solicitudes" class="text-gray-400 hover:text-blue-600 text-sm">← Solicitudes</a>
        <span class="text-gray-300">/</span>
        <h1 class="text-xl font-black text-gray-900">Nueva Solicitud</h1>
      </div>

      <form method="POST" action="/solicitudes/nueva" class="space-y-6">
        <!-- Sección 1 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="font-bold text-gray-700 mb-5 flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-600 text-white rounded-full text-xs flex items-center justify-center font-black">1</span>
            Información General
          </h2>
          <div class="space-y-4">
            <div>
              <label class="lbl">Título de la solicitud *</label>
              <input type="text" name="titulo" required placeholder="Describe brevemente qué se necesita..." class="inp"/>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="lbl">Tipo de solicitud</label>
                <select name="tipo" class="inp">
                  {% for t in [('nuevo_desarrollo','Nuevo Desarrollo'),('ajuste','Ajuste'),('correccion','Corrección'),('mejora','Mejora'),('incidencia','Incidencia'),('automatizacion','Automatización')] %}
                  <option value="{{ t[0] }}">{{ t[1] }}</option>
                  {% endfor %}
                </select>
              </div>
              <div>
                <label class="lbl">Prioridad</label>
                <select name="prioridad" class="inp">
                  <option value="baja">🟢 Baja</option>
                  <option value="media" selected>🔵 Media</option>
                  <option value="alta">🟡 Alta</option>
                  <option value="critica">🔴 Crítica</option>
                </select>
              </div>
            </div>
            <div>
              <label class="lbl">Descripción detallada</label>
              <textarea name="descripcion" rows="4" placeholder="Explica con detalle el problema o necesidad..." class="inp resize-none"></textarea>
            </div>
          </div>
        </div>

        <!-- Sección 2 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="font-bold text-gray-700 mb-5 flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-600 text-white rounded-full text-xs flex items-center justify-center font-black">2</span>
            Alcance y Responsables
          </h2>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="lbl">Área impactada</label>
              <input type="text" name="area_impactada" placeholder="Ej: Pricing / Comercial" class="inp"/>
            </div>
            <div>
              <label class="lbl">Encargado de ejecución</label>
              <input type="text" name="encargado" placeholder="Nombre del responsable" class="inp"/>
            </div>
            <div>
              <label class="lbl">Nivel de riesgo</label>
              <select name="riesgo" class="inp">
                <option value="bajo">🟢 Bajo</option>
                <option value="medio">🟡 Medio</option>
                <option value="alto">🟠 Alto</option>
                <option value="critico">🔴 Crítico</option>
              </select>
            </div>
            <div>
              <label class="lbl">Fecha estimada de finalización</label>
              <input type="date" name="fecha_estimada" class="inp"/>
            </div>
          </div>
        </div>

        <!-- Sección 3 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
          <h2 class="font-bold text-gray-700 mb-5 flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-600 text-white rounded-full text-xs flex items-center justify-center font-black">3</span>
            Impacto y KPIs
          </h2>
          <div class="space-y-4">
            <div>
              <label class="lbl">KPI asociado</label>
              <input type="text" name="kpi" placeholder="Ej: Reducir error de precios < 0.5%" class="inp"/>
            </div>
            <div>
              <label class="lbl">Impacto esperado</label>
              <textarea name="impacto" rows="3" placeholder="Describe el impacto esperado en el negocio..." class="inp resize-none"></textarea>
            </div>
          </div>
        </div>

        <div class="flex gap-3 justify-end">
          <a href="/solicitudes" class="px-6 py-2.5 border border-gray-300 text-gray-600 font-semibold rounded-lg text-sm hover:bg-gray-50 transition-colors">Cancelar</a>
          <button type="submit" class="px-8 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-sm transition-colors shadow">
            Crear Solicitud →
          </button>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
